version: '3.8'

services:
  # --- BASE DE DATOS (PostgreSQL) ---
  postgres-db:
    image: postgres:15-alpine
    container_name: innovatech-postgres
    restart: always
    environment:
      POSTGRES_USER: devops_user
      POSTGRES_PASSWORD: InnovatechSecurePassword2026
      POSTGRES_DB: innovatech_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - innovatech-net

  # --- MICROSERVICIO: DESPACHOS ---
  back-despachos:
    build:
      context: "./proyecto semestral/back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO"
      dockerfile: Dockerfile
    container_name: back-despachos
    restart: always
    ports:
      - "8081:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/innovatech_db
      - SPRING_DATASOURCE_USERNAME=devops_user
      - SPRING_DATASOURCE_PASSWORD=InnovatechSecurePassword2026
    depends_on:
      - postgres-db
    networks:
      - innovatech-net

  # --- MICROSERVICIO: VENTAS ---
  back-ventas:
    build:
      context: "./proyecto semestral/back-Ventas_SpringBoot/Springboot-API-REST"
      dockerfile: Dockerfile
    container_name: back-ventas
    restart: always
    ports:
      - "8082:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/innovatech_db
      - SPRING_DATASOURCE_USERNAME=devops_user
      - SPRING_DATASOURCE_PASSWORD=InnovatechSecurePassword2026
    depends_on:
      - postgres-db
    networks:
      - innovatech-net

# --- REDES INTERNAS ---
networks:
  innovatech-net:
    driver: bridge

# --- VOLÚMENES ---
volumes:
  postgres_data: