version: '3.8'

services:
  # --- BASE DE DATOS (MySQL) ---
  mysql-db:
    image: mysql:8.0
    container_name: innovatech-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: InnovatechSecurePassword2026
      MYSQL_DATABASE: innovatech_db
      MYSQL_USER: devops_user
      MYSQL_PASSWORD: InnovatechSecurePassword2026
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - innovatech-net

  # --- MICROSERVICIO: DESPACHOS ---
  back-despachos:
    build:
      context: "./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO" 
      dockerfile: Dockerfile
    container_name: back-despachos
    restart: always
    ports:
      - "8081:8080"
    environment:
      - DB_ENDPOINT=mysql-db
      - DB_PORT=3306
      - DB_NAME=innovatech_db
      - DB_USERNAME=devops_user
      - DB_PASSWORD=InnovatechSecurePassword2026
    depends_on:
      - mysql-db
    networks:
      - innovatech-net

  # --- MICROSERVICIO: VENTAS ---
  back-ventas:
    build:
      context: "./back-Ventas_SpringBoot/Springboot-API-REST" 
      dockerfile: Dockerfile
    container_name: back-ventas
    restart: always
    ports:
      - "8082:8080"
    environment:
      - DB_ENDPOINT=mysql-db
      - DB_PORT=3306
      - DB_NAME=innovatech_db
      - DB_USERNAME=devops_user
      - DB_PASSWORD=InnovatechSecurePassword2026
    depends_on:
      - mysql-db
    networks:
      - innovatech-net

# --- REDES INTERNAS ---
networks:
  innovatech-net:
    driver: bridge

# --- VOLÚMENES ---
volumes:
  mysql_data: