server {
    listen 8080;
    server_name localhost;
    
    root /usr/share/nginx/html;
    index index.html;

    # 1. Rutas de React
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 2. Puente a Despachos (AHORA AL PUERTO 8081)
    location /api/v1/despachos {
        proxy_pass http://10.0.142.32:8081/api/v1/despachos; 
    }

    # 3. Puente a Ventas (AHORA AL PUERTO 8082)
    location /api/v1/ventas {
        proxy_pass http://10.0.142.32:8082/api/v1/ventas; 
    }
}
