server {
    listen 8080;
    server_name localhost;
    
    root /usr/share/nginx/html;
    index index.html;

    # 1. Rutas de React (Evita el error 404 al recargar la página)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 2. Puente directo a tu microservicio de Despachos
    location /api/v1/despachos {
        proxy_pass http://10.0.142.32:8080/api/v1/despachos; 
    }

    # 3. Puente directo a tu microservicio de Ventas
    location /api/v1/ventas {
        proxy_pass http://10.0.142.32:8081/api/v1/ventas; 
    }
}
