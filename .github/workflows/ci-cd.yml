name: Innovatech Chile CI/CD Pipeline

on:
  push:
    branches: [ "deploy" ]  # Activación exclusiva en la rama deploy según rúbrica

jobs:
  # --- ETAPA 1: VALIDACIÓN E INTEGRACIÓN CONTINUA (CI) ---
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del código
      uses: actions/checkout@v4

    # Validar que el Frontend de Vite compile sin romper nada
    - name: Configurar Node.js (Frontend)
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: './proyecto semestral/front_despacho/package-lock.json'

    - name: Validar Construcción del Frontend
      run: |
        cd "proyecto semestral/front_despacho"
        npm ci
        npm run build

    # Validar que los Microservicios de Java compilen correctamente
    - name: Configurar JDK 17 (Java Backends)
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    - name: Validar Compilación Backend Despachos
      run: |
        cd "proyecto semestral/back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO"
        mvn clean package -DskipTests

    - name: Validar Compilación Backend Ventas
      run: |
        cd "proyecto semestral/back-Ventas_SpringBoot/Springboot-API-REST"
        mvn clean package -DskipTests

  # --- ETAPA 2: SMOKE TEST DE CONFIGURACIÓN ---
  docker-smoke-test:
    needs: build-and-test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del código
      uses: actions/checkout@v4

    - name: Verificar Integridad del Docker-Compose
      run: |
        cd "proyecto semestral"
        docker compose config

  # --- ETAPA 3: CONSTRUCCIÓN Y PUBLICACIÓN EN AMAZON ECR ---
  build-and-push-images:
    needs: docker-smoke-test
    runs-on: ubuntu-latest
    steps:
    - name: Checkout del código
      uses: actions/checkout@v4

    # Configurar herramientas de AWS con el Token temporal de Learner Labs
    - name: Configurar credenciales de AWS
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}  # Obligatorio para AWS Academy
        aws-region: us-east-1  # Región por defecto de AWS Academy

    # Logearse en Amazon ECR de forma segura
    - name: Iniciar sesión en Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Configurar Docker Buildx
      uses: docker/setup-buildx-action@v3

    # Construcción y subida automática a tus repositorios de ECR
    - name: Build & Push Frontend Image
      uses: docker/build-push-action@v5
      with:
        context: "./proyecto semestral/front_despacho"
        push: true
        tags: ${{ steps.login-ecr.outputs.registry }}/innovatech-front:latest

    - name: Build & Push Backend Despachos Image
      uses: docker/build-push-action@v5
      with:
        context: "./proyecto semestral/back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO"
        push: true
        tags: ${{ steps.login-ecr.outputs.registry }}/innovatech-back-despachos:latest

    - name: Build & Push Backend Ventas Image
      uses: docker/build-push-action@v5
      with:
        context: "./proyecto semestral/back-Ventas_SpringBoot/Springboot-API-REST"
        push: true
        tags: ${{ steps.login-ecr.outputs.registry }}/innovatech-back-ventas:latest

  # --- ETAPA 4: DESPLIEGUE AUTOMATIZADO EN AWS EC2 FRONTEND ---
  deploy-to-ec2:
    needs: build-and-push-images
    runs-on: ubuntu-latest
    steps:
    - name: Desplegar en EC2 vía SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          # 1. Autenticar la propia instancia EC2 contra ECR para tener permiso de descarga
          aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin ${{ secrets.AWS_ECR_REGISTRY }}
          
          # 2. Detener y borrar el contenedor viejo (si existe) para evitar choque de puertos
          docker stop front_despacho || true
          docker rm front_despacho || true
          
          # 3. Descargar la imagen más fresca recién horneada por el pipeline en la etapa 3
          docker pull ${{ secrets.AWS_ECR_REGISTRY }}/innovatech-front:latest
          
          # 4. Levantar el nuevo contenedor mapeando el puerto 80 público al 8080 interno
          docker run -d -p 80:8080 --name front_despacho ${{ secrets.AWS_ECR_REGISTRY }}/innovatech-front:latest
          
          # 5. Limpieza preventiva de espacio en la EC2 eliminando imágenes huérfanas
          docker image prune -f
